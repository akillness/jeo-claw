# jeo-claw — six-claw hive topology.
# Security posture: no host Docker socket, no host workspace binds,
# internal-only runtime/control services, allowlisted proxy egress,
# and Discord approval for every write action.

networks:
  edge:
    driver: bridge
  claw_internal:
    driver: bridge
    internal: true

volumes:
  hive_state:

services:
  egress-proxy:
    image: ubuntu/squid:latest
    container_name: jeo-egress-proxy
    user: "13:13"
    restart: unless-stopped
    networks:
      - edge
      - claw_internal
    volumes:
      - ./compose/egress-proxy/squid.conf:/etc/squid/squid.conf:ro
      - ./compose/egress-proxy/allowlist.txt:/etc/squid/allowlist.txt:ro
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:uid=13,gid=13,mode=1777
      - /run:uid=13,gid=13,mode=0755
      - /var/log/squid:uid=13,gid=13,mode=0755
      - /var/spool/squid:uid=13,gid=13,mode=0755
    healthcheck:
      test: ["CMD-SHELL", "squid -k check || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  claw-hive:
    build:
      context: .
      dockerfile: hive/Dockerfile
    container_name: jeo-claw-hive
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: .
          ignore:
            - node_modules/
            - .git/
            - data/
            - hive_state/
    depends_on:
      egress-proxy:
        condition: service_healthy
    networks:
      - claw_internal
      - edge
    environment:
      HTTP_PROXY: ${EGRESS_PROXY_URL}
      HTTPS_PROXY: ${EGRESS_PROXY_URL}
      NO_PROXY: localhost,127.0.0.1,egress-proxy,github-api-mock
      GLUE_PORT: ${GLUE_PORT:-8787}
      GITHUB_WEBHOOK_PATH: ${GITHUB_WEBHOOK_PATH:-/webhook/github}
      GLUE_EVENT_ENDPOINT: http://127.0.0.1:8787
      GCLOUD_PROJECT: ${GCLOUD_PROJECT}
      GCLOUD_SECRET_PREFIX: ${GCLOUD_SECRET_PREFIX}
      TARGET_REPO: ${TARGET_REPO}
      TARGET_BRANCH: ${TARGET_BRANCH}
      ALLOWED_REPO_OWNERS: ${ALLOWED_REPO_OWNERS:-}
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_MODEL: ${LLM_MODEL}
      OPENAI_WIRE_API: ${OPENAI_WIRE_API}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_REQUEST_CHANNEL_ID: ${DISCORD_REQUEST_CHANNEL_ID}
      DISCORD_STATUS_CHANNEL_ID: ${DISCORD_STATUS_CHANNEL_ID}
      DISCORD_APPROVAL_CHANNEL_ID: ${DISCORD_APPROVAL_CHANNEL_ID}
      DISCORD_DASHBOARD_CHANNEL_ID: ${DISCORD_DASHBOARD_CHANNEL_ID}
      DISCORD_APPROVER_ROLE_ID: ${DISCORD_APPROVER_ROLE_ID}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-}
      JEO_SECRET_SOURCE: ${JEO_SECRET_SOURCE:-gcloud}
      JEO_SECRETS_FILE: ${JEO_SECRETS_FILE:-}
      JEO_ALLOW_SELF_TEST: ${JEO_ALLOW_SELF_TEST:-}
      JEO_STATUS_ENDPOINT: ${JEO_STATUS_ENDPOINT:-http://127.0.0.1:9100/status}
      AUTONOMY: ${AUTONOMY:-}
      SQLITE_DB_PATH: /data/workflows.sqlite
    ports:
      - "127.0.0.1:${GLUE_HOST_PORT:-8787}:8787"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - hive_state:/data
      - ./secrets/live.json:/run/secrets/jeo-claw-secrets.json:ro
      - ~/.jeo:/root/.jeo:rw
      - ~/.gjc:/root/.gjc:rw
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "bun -e 'fetch(\"http://127.0.0.1:8787/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))'"]
      interval: 30s
      timeout: 10s
      retries: 3
 insert after
    develop:
      watch:
        - action: sync
          path: ./glue
          target: /app/glue
        - action: sync
          path: ./discord
          target: /app/discord
        - action: sync
          path: ./claws
          target: /app/claws
        - action: sync
          path: ./hive
          target: /app/hive
        - action: sync
          path: ./secrets
          target: /app/secrets
        - action: sync
          path: ./runtimes
          target: /app/runtimes
        - action: sync
          path: ./config
          target: /app/config
        - action: sync
          path: ./scripts
          target: /app/scripts
        - action: sync
          path: ./compare
          target: /app/compare
        - action: sync
          path: ./control
          target: /app/control
        - action: rebuild
          path: package.json
        - action: rebuild
          path: bun.lock

  github-api-mock:
    profiles:
      - test
    build:
      context: .
      dockerfile: hive/Dockerfile
    container_name: jeo-github-api-mock
    command: ["bun", "run", "scripts/mock-github.ts"]
    networks:
      - claw_internal
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /run
