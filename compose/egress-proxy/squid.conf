# Egress allowlist proxy for jeo-claw claw runtimes.
# Only destinations in allowlist.txt are reachable; everything else is denied.
http_port 3128
pid_filename /tmp/squid.pid
# Allowlisted destination domains (suffix match).
acl allowed_dst dstdomain "/etc/squid/allowlist.txt"

# Only allow CONNECT to 443 and standard http(s) ports.
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow only allowlisted destinations; deny all others.
http_access allow allowed_dst
http_access deny all

# No caching of agent traffic.
cache deny all
access_log stdio:/dev/stdout squid
