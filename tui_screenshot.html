
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GJC TUI Screenshot</title>
    <style>
        body {
            background-color: #0c0c0c;
            color: #cccccc;
            font-family: 'Consolas', 'Courier New', monospace;
            padding: 20px;
            line-height: 1.4;
        }
        .container {
            border: 1px solid #333;
            padding: 15px;
            border-radius: 5px;
            display: inline-block;
            min-width: 600px;
        }
        .header {
            font-weight: bold;

        }
        .divider {
            border-bottom: 1px solid #333;
            margin: 10px 0;
        }
        .table-header {
            font-weight: bold;
            color: #aaa;
            display: flex;
        }
        .row {
            display: flex;
            margin: 5px 0;
        }
        .col-id { width: 180px; }
        .col-runtime { width: 120px; }
        .col-stage { width: 180px; }
        .col-status { width: 150px; }
        
        .status-running { color: #50fa7b; }
        .status-pending { color: #8be9fd; }
        .status-approval { color: #f1fa8c; }
        .status-merged { color: #8be9fd; }
        
        .pending-action {
            margin-left: 20px;
            color: #f1fa8c;
            font-size: 0.9em;
        }
    </style>
</head>
